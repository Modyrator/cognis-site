<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cognis – Nim Protocol</title>
    <style>
      :root {
        --primary: #d4af37;
        --accent: #00ffcc;
        --danger: #ff004c;
        --bg: #050505;
      }
      body {
        margin: 0;
        background-color: var(--bg);
        color: var(--primary);
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .terminal-container {
        width: 90%;
        max-width: 600px;
        padding: 40px;
        border: 1px solid #222;
        background: rgba(0, 0, 0, 0.8);
        text-align: center;
      }

      .piles {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 30px 0;
        min-height: 80px;
      }
      .pile-col {
        display: flex;
        flex-direction: column-reverse;
        gap: 5px;
        cursor: pointer;
        padding: 10px;
        border: 1px solid transparent;
      }
      .pile-col:hover {
        border: 1px solid #333;
      }

      .stone {
        width: 20px;
        height: 20px;
        background: var(--primary);
        clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      }

      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(-2px, 2px);
          color: var(--danger);
        }
        100% {
          transform: translate(0);
        }
      }
      .glitching {
        animation: glitch 0.2s linear;
      }

      button {
        background: #111;
        color: var(--primary);
        border: 1px solid var(--primary);
        padding: 10px 20px;
        cursor: pointer;
        margin-top: 10px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="terminal-container">
      <h1>NIM_PROTOCOL</h1>
      <div id="ui-layer">
        <label>DIFFICULTY: </label>
        <select id="diff" style="background: #000; color: #fff">
          <option value="easy">ARCHIVE_TRAINEE</option>
          <option value="hard">SYSTEM_ADMIN</option>
        </select>
        <button onclick="startGame()">INITIALIZE</button>
      </div>

      <div id="game-layer" class="hidden">
        <div id="turn-monitor" style="color: var(--accent)">PLAYER_TURN</div>
        <div class="piles" id="piles-container"></div>
        <button onclick="endTurn()">CONFIRM_MOVE</button>
      </div>
    </div>

    <script>
      let piles = [3, 4, 5];
      let turn = "player"; // player or ai

      function startGame() {
        document.getElementById("ui-layer").classList.add("hidden");
        document.getElementById("game-layer").classList.remove("hidden");
        render();
      }

      function render() {
        const container = document.getElementById("piles-container");
        container.innerHTML = "";
        piles.forEach((count, i) => {
          const col = document.createElement("div");
          col.className = "pile-col";
          col.onclick = () => {
            if (turn === "player") takeStone(i);
          };
          for (let s = 0; s < count; s++) {
            const stone = document.createElement("div");
            stone.className = "stone";
            col.appendChild(stone);
          }
          container.appendChild(col);
        });
      }

      function takeStone(i) {
        if (piles[i] > 0) {
          piles[i]--;
          render();
        }
      }

      function endTurn() {
        turn = "ai";
        document.getElementById("turn-monitor").innerText =
          "SYSTEM_CALCULATING...";
        document.getElementById("piles-container").classList.add("glitching");
        setTimeout(() => {
          document
            .getElementById("piles-container")
            .classList.remove("glitching");
          aiMove();
        }, 800);
      }

      function aiMove() {
        const difficulty = document.getElementById("diff").value;
        let nimSum = piles.reduce((a, b) => a ^ b, 0);

        if (difficulty === "hard" && nimSum !== 0) {
          for (let i = 0; i < piles.length; i++) {
            let target = piles[i] ^ nimSum;
            if (target < piles[i]) {
              piles[i] = target;
              break;
            }
          }
        } else {
          let idx = piles.findIndex((p) => p > 0);
          if (idx !== -1) piles[idx] = Math.max(0, piles[idx] - 1);
        }

        render();
        turn = "player";
        document.getElementById("turn-monitor").innerText = "PLAYER_TURN";
        if (piles.every((p) => p === 0)) alert("PROTOCOL_COMPLETE");
      }
    </script>
  </body>
</html>
