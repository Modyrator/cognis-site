<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cognis – Ascension Trial</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #d4af37;
        font-family: "Courier New", monospace;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* CRT CONTAINER */
      #game-container {
        position: relative;
        border: 2px solid #333;
        overflow: hidden;
        background: #000;
      }

      /* SCANLINE EFFECT */
      #game-container::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(
            rgba(18, 16, 16, 0) 50%,
            rgba(0, 0, 0, 0.25) 50%
          ),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
          );
        z-index: 20;
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
      }

      /* FLICKER ANIMATION */
      .crt-flicker {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(18, 16, 16, 0.1);
        opacity: 0;
        z-index: 21;
        pointer-events: none;
        animation: flicker 0.15s infinite;
      }

      @keyframes flicker {
        0% {
          opacity: 0.1;
        }
        50% {
          opacity: 0.02;
        }
        100% {
          opacity: 0.09;
        }
      }

      #game {
        display: block;
        filter: contrast(1.2) brightness(1.1) saturate(1.2);
      }

      .ui-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 30;
        text-shadow: 2px 2px #000;
      }

      .archive-btn {
        margin-top: 20px;
        padding: 10px 20px;
        background: transparent;
        color: #d4af37;
        border: 1px solid #d4af37;
        text-decoration: none;
        font-size: 0.8rem;
        box-shadow: 0 0 5px #d4af37;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="crt-flicker"></div>
      <div class="ui-panel">
        <div>ASCENSION: <span id="currentScore">0</span>m</div>
        <div style="opacity: 0.6; font-size: 0.7rem">
          RECORD: <span id="highScore">0</span>m
        </div>
      </div>
      <canvas id="game"></canvas>
    </div>

    <a href="../index.html" class="archive-btn">⮐ BACK TO ARCHIVE</a>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("currentScore");
      const highEl = document.getElementById("highScore");

      canvas.width = 400;
      canvas.height = 600;

      const playerSprite = new Image();
      playerSprite.src = "jumpyboy.png";

      const platformSprite = new Image();
      platformSprite.src = "platformyboy.png";

      // Game State
      const gravity = 0.4;
      const jumpForce = -10;
      const platformSpeed = 1.5;
      const platformGap = 100;
      const platformCount = 8;

      let score = 0;
      let highScore = localStorage.getItem("cognis_highscore") || 0;
      highEl.innerText = highScore;

      let player = {
        x: 190,
        y: 500,
        w: 24,
        h: 24,
        dy: 0,
        vx: 0,
        onGround: false,
      };
      let platforms = [];
      let keys = {};

      function init() {
        score = 0;
        scoreEl.innerText = score;
        platforms = [];
        platforms.push({ x: 0, y: 580, w: 400, h: 20, dir: 0 });
        for (let i = 1; i < platformCount; i++) {
          spawnPlatform(canvas.height - i * platformGap);
        }
      }

      function spawnPlatform(y) {
        platforms.push({
          x: Math.random() * (canvas.width - 70),
          y: y,
          w: 70,
          h: 15,
          dir: Math.random() < 0.5 ? -1 : 1,
        });
      }

      window.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        if (e.code === "Space" && player.onGround) {
          player.dy = jumpForce;
          player.onGround = false;
        }
      });
      window.addEventListener("keyup", (e) => (keys[e.code] = false));

      function update() {
        if (keys["ArrowLeft"]) player.vx = -4;
        else if (keys["ArrowRight"]) player.vx = 4;
        else player.vx = 0;

        player.x += player.vx;
        if (!player.onGround) {
          player.dy += gravity;
          player.y += player.dy;
        }

        player.onGround = false;

        platforms.forEach((p) => {
          p.x += p.dir * platformSpeed;
          if (p.x <= 0 || p.x + p.w >= canvas.width) p.dir *= -1;

          if (
            player.dy >= 0 &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w &&
            player.y + player.h >= p.y &&
            player.y + player.h <= p.y + p.h + 10
          ) {
            player.y = p.y - player.h;
            player.dy = 0;
            player.onGround = true;
            player.x += p.dir * platformSpeed;
          }

          if (p.y > canvas.height) {
            p.y -= platformCount * platformGap;
            p.x = Math.random() * (canvas.width - p.w);
          }
        });

        if (player.y < canvas.height / 2) {
          let diff = canvas.height / 2 - player.y;
          player.y = canvas.height / 2;
          score += Math.floor(diff);
          scoreEl.innerText = Math.floor(score / 10);
          platforms.forEach((p) => (p.y += diff));
        }

        if (player.x > canvas.width) player.x = -player.w;
        if (player.x < -player.w) player.x = canvas.width;

        if (player.y > canvas.height + 50) {
          saveHighScore();
          resetGame();
        }
      }

      function saveHighScore() {
        let finalScore = Math.floor(score / 10);
        if (finalScore > highScore) {
          highScore = finalScore;
          localStorage.setItem("cognis_highscore", highScore);
          highEl.innerText = highScore;
        }
      }

      function resetGame() {
        player.x = 190;
        player.y = 500;
        player.dy = 0;
        init();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Platforms Sprite
        platforms.forEach((p) => {
          ctx.drawImage(platformSprite, p.x, p.y, p.w, p.h);
        });

        // Draw Player Sprite
        ctx.drawImage(playerSprite, player.x, player.y, player.w, player.h);
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      // Wait for images to load before starting
      let imagesLoaded = 0;
      [playerSprite, platformSprite].forEach((img) => {
        img.onload = () => {
          imagesLoaded++;
          if (imagesLoaded === 2) {
            init();
            loop();
          }
        };
      });
    </script>
  </body>
</html>
