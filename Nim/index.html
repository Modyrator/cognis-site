<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cognis – Nim Protocol</title>
    <style>
      :root {
        --metal: #8a8d8f;
        --dusty-gold: #c5b358;
        --soft-teal: #7fbdb0;
        --bg: #1a1a1a;
        --glass: rgba(255, 255, 255, 0.05);
      }
      body {
        margin: 0;
        background-color: var(--bg);
        color: var(--dusty-gold);
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .terminal-container {
        width: 90%;
        max-width: 600px;
        padding: 40px;
        border: 2px solid var(--metal);
        border-radius: 20px;
        background: var(--glass);
        text-align: center;
      }

      .piles {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 30px 0;
        min-height: 140px;
      }
      .pile-col {
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
        padding: 15px;
        border-radius: 15px;
        transition: 0.3s;
        cursor: pointer;
      }
      .pile-col.active {
        background: rgba(197, 179, 88, 0.2);
        border: 1px solid var(--dusty-gold);
      }
      .pile-col.disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* Rounded Pixel Sprite */
      .stone {
        width: 24px;
        height: 24px;
        background: var(--soft-teal);
        border-radius: 6px;
        box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
      }

      button {
        background: var(--metal);
        color: var(--bg);
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
      .hidden {
        display: none;
      }
      #msg {
        margin-top: 20px;
        font-size: 0.9rem;
        color: var(--soft-teal);
      }
    </style>
  </head>
  <body>
    <div class="terminal-container">
      <h1>PROTOCOL: ORDERED</h1>
      <div id="ui-layer">
        <button onclick="startGame()">INITIATE_SEQUENCE</button>
      </div>

      <div id="game-layer" class="hidden">
        <div id="status">SELECT FROM LOWEST PILE TO HIGHEST</div>
        <div class="piles" id="piles-container"></div>
        <button id="confirm-btn" onclick="endTurn()">CONFIRM_MOVE</button>
        <div id="game-over-screen" class="hidden">
          <h2>SEQUENCE_COMPLETE</h2>
          <button onclick="location.reload()">REBOOT</button>
        </div>
      </div>
    </div>

    <script>
      let piles = [2, 3, 4, 5, 6];
      let activeIndex = 0; // The index of the pile allowed to be picked

      function startGame() {
        document.getElementById("ui-layer").classList.add("hidden");
        document.getElementById("game-layer").classList.remove("hidden");
        render();
      }

      function render() {
        const container = document.getElementById("piles-container");
        container.innerHTML = "";
        piles.forEach((count, i) => {
          const col = document.createElement("div");
          col.className = `pile-col ${i === activeIndex ? "active" : "disabled"}`;
          col.onclick = () => {
            if (i === activeIndex) takeStone(i);
          };
          for (let s = 0; s < count; s++) {
            const stone = document.createElement("div");
            stone.className = "stone";
            col.appendChild(stone);
          }
          container.appendChild(col);
        });
      }

      function takeStone(i) {
        if (piles[i] > 0) {
          piles[i]--;
          render();
        }
      }

      function endTurn() {
        // Move to next pile in the sequence
        activeIndex++;
        if (activeIndex >= piles.length) {
          // End of sequence reached
          document.getElementById("game-layer").innerHTML =
            "<h1>SEQUENCE_FINISHED</h1>";
        } else {
          document.getElementById("status").innerText =
            `NEXT_PILE: ${activeIndex + 1}`;
          render();
        }
      }
    </script>
  </body>
</html>
