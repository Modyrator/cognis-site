<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cognis – Ascension Trial</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #d4af37;
        font-family: "Courier New", monospace;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* CRT CONTAINER */
      #game-container {
        position: relative;
        border: 2px solid #333;
        overflow: hidden;
        background: #000;
      }

      /* SCANLINE EFFECT */
      #game-container::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(
            rgba(18, 16, 16, 0) 50%,
            rgba(0, 0, 0, 0.25) 50%
          ),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
          );
        z-index: 20;
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
      }

      .crt-flicker {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(18, 16, 16, 0.1);
        opacity: 0;
        z-index: 21;
        pointer-events: none;
        animation: flicker 0.15s infinite;
      }

      @keyframes flicker {
        0% {
          opacity: 0.1;
        }
        50% {
          opacity: 0.02;
        }
        100% {
          opacity: 0.09;
        }
      }

      #game {
        display: block;
        filter: contrast(1.2) brightness(1.1) saturate(1.2);
      }

      .ui-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 30;
        text-shadow: 2px 2px #000;
      }

      #ability-bar {
        position: absolute;
        bottom: 10px;
        right: 10px;
        font-size: 0.7rem;
        text-align: right;
        z-index: 30;
      }

      .archive-btn {
        margin-top: 20px;
        padding: 10px 20px;
        background: transparent;
        color: #d4af37;
        border: 1px solid #d4af37;
        text-decoration: none;
        font-size: 0.8rem;
        box-shadow: 0 0 5px #d4af37;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="crt-flicker"></div>
      <div class="ui-panel">
        <div>ASCENSION: <span id="currentScore">0</span>m</div>
        <div style="opacity: 0.6; font-size: 0.7rem">
          RECORD: <span id="highScore">0</span>m
        </div>
      </div>
      <div id="ability-bar"></div>
      <canvas id="game"></canvas>
    </div>

    <a href="../index.html" class="archive-btn">⮐ BACK TO ARCHIVE</a>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("currentScore");
      const highEl = document.getElementById("highScore");
      const abilityEl = document.getElementById("ability-bar");

      canvas.width = 400;
      canvas.height = 600;

      const playerSprite = new Image();
      playerSprite.src = "jumpyboy.png";

      const platformSprite = new Image();
      platformSprite.src = "platformyboy.png";

      // Game Physics
      const gravity = 0.4;
      const jumpForce = -10;
      const basePlatformSpeed = 1.5;
      const platformGap = 100;
      const platformCount = 8;

      let score = 0;
      let highScore = localStorage.getItem("cognis_highscore") || 0;
      highEl.innerText = highScore;

      let player = {
        x: 190,
        y: 500,
        w: 24,
        h: 24,
        dy: 0,
        vx: 0,
        onGround: false,
        shielded: false,
        magnetized: false,
      };

      let platforms = [];
      let powerUps = [];
      let keys = {};
      let slowMoTimer = 0;
      let magnetTimer = 0;

      function init() {
        score = 0;
        scoreEl.innerText = score;
        platforms = [];
        powerUps = [];
        slowMoTimer = 0;
        magnetTimer = 0;
        player.shielded = false;
        player.magnetized = false;

        // Ground
        platforms.push({ x: 0, y: 580, w: 400, h: 20, dir: 0 });
        for (let i = 1; i < platformCount; i++) {
          spawnPlatform(canvas.height - i * platformGap);
        }
      }

      function spawnPlatform(y) {
        const plat = {
          x: Math.random() * (canvas.width - 70),
          y: y,
          w: 70,
          h: 15,
          dir: Math.random() < 0.5 ? -1 : 1,
        };
        platforms.push(plat);

        // 15% chance to spawn a power-up on new platforms
        if (Math.random() < 0.15) {
          const types = ["shield", "slowmo", "magnet"];
          powerUps.push({
            x: plat.x + plat.w / 2 - 8,
            y: plat.y - 25,
            w: 16,
            h: 16,
            type: types[Math.floor(Math.random() * types.length)],
            parentPlat: plat,
          });
        }
      }

      window.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        // Added W and Up Arrow for Jump alongside Space
        if (
          (e.code === "Space" || e.code === "KeyW" || e.code === "ArrowUp") &&
          player.onGround
        ) {
          player.dy = jumpForce;
          player.onGround = false;
        }
      });
      window.addEventListener("keyup", (e) => (keys[e.code] = false));

      function update() {
        // WASD & Arrow Movement
        if (keys["ArrowLeft"] || keys["KeyA"]) player.vx = -4;
        else if (keys["ArrowRight"] || keys["KeyD"]) player.vx = 4;
        else player.vx = 0;

        // Magnet Logic (Lattice Pull)
        if (magnetTimer > 0) {
          magnetTimer--;
          player.magnetized = true;
          platforms.forEach((p) => {
            if (Math.abs(player.y - p.y) < 60 && player.dy > 0) {
              let centerX = p.x + p.w / 2 - player.w / 2;
              player.x += (centerX - player.x) * 0.08;
            }
          });
        } else {
          player.magnetized = false;
        }

        player.x += player.vx;
        if (!player.onGround) {
          player.dy += gravity;
          player.y += player.dy;
        }

        player.onGround = false;

        // Platform Speed (Slow-mo check)
        let currentSpeed = basePlatformSpeed;
        if (slowMoTimer > 0) {
          slowMoTimer--;
          currentSpeed *= 0.4;
        }

        platforms.forEach((p) => {
          p.x += p.dir * currentSpeed;
          if (p.x <= 0 || p.x + p.w >= canvas.width) p.dir *= -1;

          // Landing Detection
          if (
            player.dy >= 0 &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w &&
            player.y + player.h >= p.y &&
            player.y + player.h <= p.y + p.h + 10
          ) {
            player.y = p.y - player.h;
            player.dy = 0;
            player.onGround = true;
            player.x += p.dir * currentSpeed;
          }

          if (p.y > canvas.height) {
            p.y -= platformCount * platformGap;
            p.x = Math.random() * (canvas.width - p.w);
          }
        });

        // Power-up Collision
        powerUps.forEach((pu, i) => {
          pu.y = pu.parentPlat.y - 25;
          pu.x = pu.parentPlat.x + pu.parentPlat.w / 2 - 8;

          if (
            player.x < pu.x + pu.w &&
            player.x + player.w > pu.x &&
            player.y < pu.y + pu.h &&
            player.y + player.h > pu.y
          ) {
            if (pu.type === "shield") player.shielded = true;
            if (pu.type === "slowmo") slowMoTimer = 400;
            if (pu.type === "magnet") magnetTimer = 400;

            powerUps.splice(i, 1);
          }
        });

        // Cleanup off-screen powerups
        powerUps = powerUps.filter((pu) => pu.y < canvas.height);

        // Scroll
        if (player.y < canvas.height / 2) {
          let diff = canvas.height / 2 - player.y;
          player.y = canvas.height / 2;
          score += Math.floor(diff);
          scoreEl.innerText = Math.floor(score / 10);
          platforms.forEach((p) => (p.y += diff));
        }

        // Wrap
        if (player.x > canvas.width) player.x = -player.w;
        if (player.x < -player.w) player.x = canvas.width;

        // Death / Shield Check
        if (player.y > canvas.height + 50) {
          if (player.shielded) {
            player.dy = -15; // Kinetic Aegis Bounce
            player.shielded = false;
          } else {
            saveHighScore();
            resetGame();
          }
        }

        // UI Text Update
        let status = [];
        if (player.shielded)
          status.push("<span style='color:#d4af37'>[AEGIS]</span>");
        if (slowMoTimer > 0)
          status.push("<span style='color:#00ffcc'>[BUFFER]</span>");
        if (magnetTimer > 0)
          status.push("<span style='color:#ff004c'>[LATTICE]</span>");
        abilityEl.innerHTML = status.join("<br>");
      }

      function saveHighScore() {
        let finalScore = Math.floor(score / 10);
        if (finalScore > highScore) {
          highScore = finalScore;
          localStorage.setItem("cognis_highscore", highScore);
          highEl.innerText = highScore;
        }
      }

      function resetGame() {
        player.x = 190;
        player.y = 500;
        player.dy = 0;
        init();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Platforms
        platforms.forEach((p) => {
          ctx.drawImage(platformSprite, p.x, p.y, p.w, p.h);
        });

        // Draw Powerups (Glowing Orbs)
        powerUps.forEach((pu) => {
          ctx.shadowBlur = 10;
          if (pu.type === "shield") ctx.shadowColor = ctx.fillStyle = "#d4af37";
          if (pu.type === "slowmo") ctx.shadowColor = ctx.fillStyle = "#00ffcc";
          if (pu.type === "magnet") ctx.shadowColor = ctx.fillStyle = "#ff004c";
          ctx.beginPath();
          ctx.arc(pu.x + 8, pu.y + 8, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        });

        // Draw Shield Aura if active
        if (player.shielded) {
          ctx.strokeStyle = "#d4af37";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(
            player.x + player.w / 2,
            player.y + player.h / 2,
            22,
            0,
            Math.PI * 2
          );
          ctx.stroke();
        }

        // Draw Player Sprite
        ctx.drawImage(playerSprite, player.x, player.y, player.w, player.h);
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      let imagesLoaded = 0;
      [playerSprite, platformSprite].forEach((img) => {
        img.onload = () => {
          imagesLoaded++;
          if (imagesLoaded === 2) {
            init();
            loop();
          }
        };
      });
    </script>
  </body>
</html>
