<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cognis – Nim Protocol</title>
    <style>
      :root {
        --metal: #8a8d8f;
        --dusty-gold: #c5b358;
        --bg: #1a1a1a;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--dusty-gold);
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .terminal-container {
        width: 90%;
        max-width: 600px;
        padding: 40px;
        border: 2px solid var(--metal);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
        text-align: center;
      }

      .piles {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 30px 0;
        min-height: 140px;
      }
      .back-link {
        display: block;
        margin-top: 60px;
        text-align: center;
        color: var(--gold);
        text-decoration: none;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 2px;
        transition: 0.3s;
      }
      .back-link:hover {
        letter-spacing: 4px;
        text-shadow: 0 0 10px var(--gold);
      }
      .pile-col {
        display: flex;
        flex-direction: column-reverse;
        gap: 5px;
        padding: 10px;
        cursor: pointer;
        border: 1px solid transparent;
      }
      .pile-col:hover {
        border: 1px solid var(--dusty-gold);
      }

      .stone-sprite {
        width: 30px;
        height: 30px;
        background-size: contain;
        background-repeat: no-repeat;
      }
      button {
        background: var(--metal);
        color: var(--bg);
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="terminal-container">
      <h1>NIM_PROTOCOL_ACTIVE</h1>
      <div id="status">YOUR_TURN</div>
      <div class="piles" id="piles-container"></div>
      <button id="confirm-btn" onclick="playerMove()" disabled>
        CONFIRM_TURN
      </button>
    </div>

    <script>
      const stoneUrl = "nimstone.png";
      let piles = [3, 4, 5];
      let selectedPile = -1;
      let removeCount = 0;

      function render() {
        const container = document.getElementById("piles-container");
        container.innerHTML = "";
        piles.forEach((count, i) => {
          const col = document.createElement("div");
          col.className = "pile-col";
          col.onclick = () => selectPile(i);
          for (let s = 0; s < count; s++) {
            const stone = document.createElement("div");
            stone.className = "stone-sprite";
            stone.style.backgroundImage = `url('${stoneUrl}')`;
            col.appendChild(stone);
          }
          container.appendChild(col);
        });
      }

      function selectPile(i) {
        if (piles[i] > 0 && (selectedPile === -1 || selectedPile === i)) {
          selectedPile = i;
          piles[i]--;
          removeCount++;
          document.getElementById("confirm-btn").disabled = false;
          render();
        }
      }

      function playerMove() {
        selectedPile = -1;
        removeCount = 0;
        document.getElementById("confirm-btn").disabled = true;
        if (checkWin()) return;

        document.getElementById("status").innerText = "AI_CALCULATING...";
        setTimeout(aiMove, 800);
      }

      function aiMove() {
        // Nim-sum (XOR) strategy
        let nimSum = piles.reduce((a, b) => a ^ b, 0);

        if (nimSum !== 0) {
          for (let i = 0; i < piles.length; i++) {
            let target = piles[i] ^ nimSum;
            if (target < piles[i]) {
              piles[i] = target;
              break;
            }
          }
        } else {
          let idx = piles.findIndex((p) => p > 0);
          if (idx !== -1) piles[idx] = Math.max(0, piles[idx] - 1);
        }

        render();
        if (!checkWin())
          document.getElementById("status").innerText = "YOUR_TURN";
      }

      function checkWin() {
        if (piles.every((p) => p === 0)) {
          document.getElementById("status").innerText = "GAME_OVER";
          return true;
        }
        return false;
      }

      render();
    </script>
    <div style="text-align: center; margin-top: 40px">
      <a href="../index.html" class="back-link">BACK TO ARCHIVE</a>
    </div>
  </body>
</html>
