<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cognis – Ascension Trial</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #d4af37;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        gap: 20px;
      }

      /* LEGEND PANEL */
      #legend {
        width: 200px;
        border: 1px solid #333;
        padding: 20px;
        background: rgba(10, 10, 10, 0.9);
        font-size: 0.8rem;
        line-height: 1.4;
      }

      .legend-item {
        margin-bottom: 15px;
      }
      .color-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 5px;
      }

      /* CRT CONTAINER */
      #game-container {
        position: relative;
        border: 2px solid #444;
        overflow: hidden;
        background: #000;
        box-shadow: 0 0 20px rgba(0, 0, 0, 1);
      }

      #game-container::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(
            rgba(18, 16, 16, 0) 50%,
            rgba(0, 0, 0, 0.2) 50%
          ),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.03),
            rgba(0, 255, 0, 0.01),
            rgba(0, 0, 255, 0.03)
          );
        z-index: 20;
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
      }

      #game {
        display: block;
        filter: contrast(1.1) brightness(1.1);
      }

      .ui-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 30;
        pointer-events: none;
      }

      /* STATUS MONITOR */
      #status-display {
        position: absolute;
        bottom: 20px;
        left: 20px;
        z-index: 30;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px;
        border-left: 2px solid var(--gold);
      }

      .active-buff {
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 5px;
        animation: pulse 1s infinite alternate;
      }

      @keyframes pulse {
        from {
          opacity: 0.4;
        }
        to {
          opacity: 1;
        }
      }

      .archive-btn {
        position: absolute;
        bottom: 20px;
        right: -150px; /* Offset from center body */
        padding: 10px;
        color: #d4af37;
        border: 1px solid #d4af37;
        text-decoration: none;
        font-size: 0.7rem;
      }
    </style>
  </head>
  <body>
    <div id="legend">
      <h3 style="color: #fff; margin-top: 0">SYSTEM LOG</h3>
      <div class="legend-item">
        <strong>CONTROLS:</strong><br />
        WASD or ARROWS<br />
        SPACE to Jump
      </div>
      <hr style="border: 0; border-top: 1px solid #333" />
      <div class="legend-item">
        <span class="color-dot" style="background: #d4af37"></span>
        <strong>AEGIS:</strong><br />Survival Shield.
      </div>
      <div class="legend-item">
        <span class="color-dot" style="background: #00ffcc"></span>
        <strong>BUFFER:</strong><br />Slows Time.
      </div>
      <div class="legend-item">
        <span class="color-dot" style="background: #ff004c"></span>
        <strong>LATTICE:</strong><br />Magnet Pull.
      </div>
    </div>

    <div id="game-container">
      <div class="ui-panel">
        <div style="font-size: 1.2rem">
          ASCENSION: <span id="currentScore">0</span>m
        </div>
        <div style="opacity: 0.6; font-size: 0.7rem">
          RECORD: <span id="highScore">0</span>m
        </div>
      </div>

      <div id="status-display">
        <div style="font-size: 0.6rem; opacity: 0.5">OVERCLOCK STATUS:</div>
        <div id="active-list">NOMINAL</div>
      </div>

      <canvas id="game"></canvas>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("currentScore");
      const highEl = document.getElementById("highScore");
      const activeList = document.getElementById("active-list");

      canvas.width = 400;
      canvas.height = 600;

      // Sound System
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function playTone(freq, type, duration, vol = 0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + duration
        );
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      }

      const sounds = {
        jump: () => playTone(400, "square", 0.1),
        pickup: () => {
          playTone(600, "sine", 0.1);
          setTimeout(() => playTone(900, "sine", 0.1), 50);
        },
        death: () => {
          playTone(200, "sawtooth", 0.3);
          playTone(100, "sawtooth", 0.5);
        },
      };

      const playerSprite = new Image();
      playerSprite.src = "jumpyboy.png";
      const platformSprite = new Image();
      platformSprite.src = "platformyboy.png";

      let score = 0;
      let highScore = localStorage.getItem("cognis_highscore") || 0;
      highEl.innerText = highScore;

      let player = {
        x: 190,
        y: 500,
        w: 24,
        h: 24,
        dy: 0,
        vx: 0,
        onGround: false,
        shielded: false,
      };
      let platforms = [],
        powerUps = [],
        keys = {};
      let slowMoTimer = 0,
        magnetTimer = 0;

      function init() {
        score = 0;
        scoreEl.innerText = score;
        platforms = [];
        powerUps = [];
        slowMoTimer = 0;
        magnetTimer = 0;
        player.shielded = false;
        platforms.push({ x: 0, y: 580, w: 400, h: 20, dir: 0 });
        for (let i = 1; i < 8; i++) spawnPlatform(canvas.height - i * 100);
      }

      function spawnPlatform(y) {
        const plat = {
          x: Math.random() * 330,
          y: y,
          w: 70,
          h: 15,
          dir: Math.random() < 0.5 ? -1 : 1,
        };
        platforms.push(plat);
        if (Math.random() < 0.35) {
          // INCREASED PROBABILITY
          const types = ["shield", "slowmo", "magnet"];
          powerUps.push({
            x: plat.x + 25,
            y: plat.y - 25,
            w: 16,
            h: 16,
            type: types[Math.floor(Math.random() * types.length)],
            parentPlat: plat,
          });
        }
      }

      window.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        if (
          (e.code === "Space" || e.code === "KeyW" || e.code === "ArrowUp") &&
          player.onGround
        ) {
          player.dy = -10;
          player.onGround = false;
          sounds.jump();
        }
      });
      window.addEventListener("keyup", (e) => (keys[e.code] = false));

      function update() {
        if (keys["ArrowLeft"] || keys["KeyA"]) player.vx = -4;
        else if (keys["ArrowRight"] || keys["KeyD"]) player.vx = 4;
        else player.vx = 0;

        if (magnetTimer > 0) {
          magnetTimer--;
          platforms.forEach((p) => {
            if (Math.abs(player.y - p.y) < 70 && player.dy > 0) {
              player.x += (p.x + p.w / 2 - player.w / 2 - player.x) * 0.1;
            }
          });
        }

        player.x += player.vx;
        if (!player.onGround) {
          player.dy += 0.4;
          player.y += player.dy;
        }
        player.onGround = false;

        let speed = slowMoTimer-- > 0 ? 0.6 : 1.5;

        platforms.forEach((p) => {
          p.x += p.dir * speed;
          if (p.x <= 0 || p.x + p.w >= canvas.width) p.dir *= -1;
          if (
            player.dy >= 0 &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w &&
            player.y + player.h >= p.y &&
            player.y + player.h <= p.y + 15
          ) {
            player.y = p.y - player.h;
            player.dy = 0;
            player.onGround = true;
            player.x += p.dir * speed;
          }
          if (p.y > canvas.height) {
            p.y -= 800;
            p.x = Math.random() * 330;
          }
        });

        powerUps.forEach((pu, i) => {
          pu.y = pu.parentPlat.y - 25;
          pu.x = pu.parentPlat.x + 25;
          if (
            player.x < pu.x + 16 &&
            player.x + 24 > pu.x &&
            player.y < pu.y + 16 &&
            player.y + 24 > pu.y
          ) {
            sounds.pickup();
            if (pu.type === "shield") player.shielded = true;
            if (pu.type === "slowmo") slowMoTimer = 400;
            if (pu.type === "magnet") magnetTimer = 400;
            powerUps.splice(i, 1);
          }
        });

        if (player.y < 300) {
          let diff = 300 - player.y;
          player.y = 300;
          score += Math.floor(diff);
          scoreEl.innerText = Math.floor(score / 10);
          platforms.forEach((p) => (p.y += diff));
        }

        if (player.x > canvas.width) player.x = -24;
        if (player.x < -24) player.x = canvas.width;

        if (player.y > canvas.height + 50) {
          if (player.shielded) {
            player.dy = -15;
            player.shielded = false;
            sounds.pickup();
          } else {
            sounds.death();
            saveHighScore();
            resetGame();
          }
        }

        // UI Monitor Logic
        let active = [];
        if (player.shielded)
          active.push(
            "<div class='active-buff' style='color:#d4af37'>[AEGIS_ACTIVE]</div>"
          );
        if (slowMoTimer > 0)
          active.push(
            "<div class='active-buff' style='color:#00ffcc'>[BUFFER_ACTIVE]</div>"
          );
        if (magnetTimer > 0)
          active.push(
            "<div class='active-buff' style='color:#ff004c'>[LATTICE_ACTIVE]</div>"
          );
        activeList.innerHTML = active.length ? active.join("") : "NOMINAL";
      }

      function saveHighScore() {
        let s = Math.floor(score / 10);
        if (s > highScore) {
          highScore = s;
          localStorage.setItem("cognis_highscore", s);
          highEl.innerText = s;
        }
      }

      function resetGame() {
        player.x = 190;
        player.y = 500;
        player.dy = 0;
        init();
      }

      function draw() {
        ctx.clearRect(0, 0, 400, 600);
        platforms.forEach((p) =>
          ctx.drawImage(platformSprite, p.x, p.y, p.w, p.h)
        );
        powerUps.forEach((pu) => {
          ctx.fillStyle =
            pu.type === "shield"
              ? "#d4af37"
              : pu.type === "slowmo"
              ? "#00ffcc"
              : "#ff004c";
          ctx.beginPath();
          ctx.arc(pu.x + 8, pu.y + 8, 8, 0, 7);
          ctx.fill();
        });
        if (player.shielded) {
          ctx.strokeStyle = "#d4af37";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(player.x + 12, player.y + 12, 20, 0, 7);
          ctx.stroke();
        }
        ctx.drawImage(playerSprite, player.x, player.y, player.w, player.h);
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      let loaded = 0;
      [playerSprite, platformSprite].forEach(
        (i) =>
          (i.onload = () => {
            if (++loaded === 2) {
              init();
              loop();
            }
          })
      );
    </script>
  </body>
</html>
