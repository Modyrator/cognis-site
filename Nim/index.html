<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cognis – Nim Protocol</title>
    <style>
      :root {
        --metal: #8a8d8f;
        --dusty-gold: #c5b358;
        --soft-teal: #7fbdb0;
        --bg: #1a1a1a;
        --glass: rgba(255, 255, 255, 0.05);
        --danger: #d45858;
      }
      body {
        margin: 0;
        background-color: var(--bg);
        color: var(--dusty-gold);
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .terminal-container {
        width: 90%;
        max-width: 600px;
        padding: 40px;
        border: 2px solid var(--metal);
        border-radius: 20px;
        background: var(--glass);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .piles {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 30px 0;
        min-height: 140px;
      }
      .pile-col {
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
        padding: 15px;
        border-radius: 15px;
        transition: 0.3s;
      }
      .pile-col.active {
        background: rgba(197, 179, 88, 0.2);
        border: 1px solid var(--dusty-gold);
        cursor: pointer;
      }
      .pile-col.disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .stone {
        width: 24px;
        height: 24px;
        background: var(--soft-teal);
        border-radius: 6px;
        box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
      }

      #corruption-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          transparent 20%,
          var(--danger) 150%
        );
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
      }

      button {
        background: var(--metal);
        color: var(--bg);
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="terminal-container">
      <div id="corruption-overlay"></div>
      <h1>PROTOCOL: ORDERED</h1>
      <div id="ui-layer">
        <button onclick="startGame()">INITIATE_SEQUENCE</button>
      </div>

      <div id="game-layer" class="hidden">
        <div id="status">PLAYER_TURN</div>
        <div class="piles" id="piles-container"></div>
        <button id="confirm-btn" onclick="playerEndTurn()">CONFIRM_MOVE</button>
      </div>
    </div>

    <script>
      let piles = [2, 3, 4, 5, 6];
      let activeIndex = 0;
      let turn = "player";

      function startGame() {
        document.getElementById("ui-layer").classList.add("hidden");
        document.getElementById("game-layer").classList.remove("hidden");
        render();
      }

      function render() {
        const container = document.getElementById("piles-container");
        container.innerHTML = "";
        piles.forEach((count, i) => {
          const col = document.createElement("div");
          col.className = `pile-col ${i === activeIndex ? "active" : "disabled"}`;
          col.onclick = () => {
            if (turn === "player" && i === activeIndex) takeStone(i);
          };
          for (let s = 0; s < count; s++) {
            const stone = document.createElement("div");
            stone.className = "stone";
            col.appendChild(stone);
          }
          container.appendChild(col);
        });
      }

      function takeStone(i) {
        piles[i]--;
        render();
      }

      function playerEndTurn() {
        if (piles[activeIndex] > 0) return; // Must finish current pile
        activeIndex++;
        updateCorruption();

        if (activeIndex >= piles.length) {
          endGame("PLAYER_SUCCESS");
        } else {
          turn = "ai";
          document.getElementById("status").innerText = "SYSTEM_CALCULATING...";
          setTimeout(aiMove, 1000);
        }
      }

      function aiMove() {
        // AI makes a move on the current active pile
        if (piles[activeIndex] > 0) {
          piles[activeIndex]--;
        }
        render();
        turn = "player";
        document.getElementById("status").innerText = "PLAYER_TURN";
      }

      function updateCorruption() {
        const overlay = document.getElementById("corruption-overlay");
        overlay.style.opacity = (activeIndex / piles.length) * 0.4;
      }

      function endGame(msg) {
        document.getElementById("game-layer").innerHTML =
          `<h1>${msg}</h1><button onclick='location.reload()'>REBOOT</button>`;
      }
    </script>
  </body>
</html>
