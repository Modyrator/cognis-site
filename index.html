<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cognis – Archive</title>
    <link rel="icon" href="site icon.png" type="image/x-icon" />
    <style>
      :root {
        --primary: #d4af37; /* Gold */
        --accent: #00ffcc; /* Teal */
        --danger: #ff004c; /* Red/Pink */
        --bg: #050505;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        color: var(--primary);
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
      }

      .terminal-container {
        width: 90%;
        max-width: 600px;
        padding: 40px;
        border: 1px solid #222;
        background: rgba(0, 0, 0, 0.8);
        box-shadow: 0 0 20px rgba(0, 0, 0, 1);
      }

      h1 {
        font-size: 1.8rem;
        letter-spacing: 2px;
        margin-bottom: 5px;
        text-transform: uppercase;
      }

      .status-text {
        font-size: 0.8rem;
        opacity: 0.6;
        margin-bottom: 30px;
      }

      /* Links Styling */
      .log-link {
        color: var(--accent);
        text-decoration: none;
        display: inline-block;
        margin: 12px 0;
        transition: 0.3s;
        font-weight: bold;
      }

      .log-link:hover {
        color: #fff;
        text-shadow: 0 0 8px var(--accent);
      }

      /* Input Styling */
      .input-wrapper {
        margin: 30px 0;
      }

      input {
        background: #111;
        border: 1px solid #444;
        padding: 10px;
        color: var(--accent);
        font-family: inherit;
        text-align: center;
        width: 250px;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
      }

      /* Special Links */
      .big-link {
        font-size: 1.2rem;
        color: var(--danger);
        font-weight: bold;
        text-transform: uppercase;
        display: inline-block;
        margin: 20px 0;
        padding: 15px 25px;
        border: 2px solid var(--danger);
        text-decoration: none;
        animation: pulse 2s infinite ease-in-out;
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 5px var(--danger);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 20px var(--danger);
          transform: scale(1.02);
        }
      }

      hr {
        border: 0;
        border-top: 1px dashed #333;
        margin: 20px 0;
      }

      .hint {
        font-size: 0.7rem;
        opacity: 0.5;
        display: block;
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <div class="terminal-container">
      <header>
        <h1>Cognis – Archive Log</h1>
        <p class="status-text">Memory fragments stored. Stability: 84%</p>
      </header>

      <a href="cognis-story.html" class="log-link">
        ▶ [READ ENTRY]: The Soul of Invention
      </a>

      <hr />

      <div class="input-wrapper">
        <label class="hint">AUTHORIZED CLEARANCE REQUIRED</label>
        <input
          type="text"
          id="accessInput"
          placeholder="Enter Access Phrase..."
        />
      </div>

      <nav>
        <a id="secretLink1" class="log-link" href="ModyAxiomArtifact/">
          Terminal: ModyAxiomArtifact
        </a>
        <br />
        <a id="secretLink2" class="log-link" href="Continuity7/">
          Terminal: Continuity 7
        </a>
        <br />
        <a id="secretLink3" class="big-link" href="FaydricTomaixPersistence/">
          Terminal: 73rra Robot World
        </a>
        <br />
        <a
          id="secretLink4"
          class="log-link"
          style="color: var(--primary)"
          href="Game/"
        >
          ▶ [INITIATE]: Ascension Trial
        </a>
        <br />
        <a
          id="secretLink5"
          class="log-link"
          style="color: var(--primary)"
          href="Seeker/"
        >
          ▶ [INITIATE]: Seeker Simulation
        </a>
        <br />
        <a
          id="secretLink6"
          class="log-link"
          style="color: var(--primary)"
          href="Nim/"
        >
          ▶ [INITIATE]: Nim Protocol
        </a>
      </nav>
    </div>
  </body>
</html>
