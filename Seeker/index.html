<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>73RRA – SIGNAL_SEEKER: TERMINAL_THREAT</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #00ffcc;
        font-family: "Courier New", monospace;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #sidebar {
        width: 320px;
        border-left: 1px solid #1a1a1a;
        background: rgba(0, 5, 5, 0.95);
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-shadow: -10px 0 20px rgba(0, 0, 0, 0.5);
        z-index: 10;
      }
      #log-header {
        font-size: 12px;
        color: #fff;
        margin-bottom: 15px;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
      }
      #log-content {
        flex-grow: 1;
        overflow-y: auto;
        font-size: 11px;
        color: #666;
        line-height: 1.6;
      }
      #log-content span {
        display: block;
        margin-bottom: 12px;
        border-left: 2px solid #00ffcc;
        padding-left: 10px;
        color: #aaa;
      }
      #game-container {
        position: relative;
        flex-grow: 1;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
        background: #000;
        cursor: none;
      }
      #ui-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: none;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 2px;
        z-index: 5;
      }
      #exit-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 6px 14px;
        border: 1px solid #333;
        background: rgba(0, 0, 0, 0.8);
        color: #555;
        font-size: 10px;
        text-decoration: none;
        z-index: 100;
      }
      #exit-btn:hover {
        color: #fff;
        border-color: #00ffcc;
      }
      #minimap {
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 150px;
        height: 150px;
        border: 1px solid #1a3a3a;
        background: rgba(0, 20, 20, 0.4);
        z-index: 5;
      }
      .warning-ui {
        color: #ff004c !important;
        text-shadow: 0 0 10px #ff004c;
      }
      #game-over {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 0, 76, 0.1);
        color: #ff004c;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
      }
    </style>
  </head>
  <body>
    <div id="game-over">
      <h1>CONNECTION_TERMINATED</h1>
      <p>SCANNER_INTEGRITY: 0%</p>
      <button
        onclick="location.reload()"
        style="
          background: none;
          border: 1px solid #ff004c;
          color: #ff004c;
          padding: 10px 20px;
          cursor: pointer;
          font-family: inherit;
        "
      >
        REBOOT_SYSTEM
      </button>
    </div>

    <div id="game-container">
      <div id="ui-overlay">
        NODES_SECURED: <span id="score">0</span><br />
        INTEGRITY: <span id="hp">100</span>%<br />
        SYNC: <span id="sync">0</span>%<br />
        STATUS: <span id="status">NOMINAL</span>
      </div>
      <a href="../index.html" id="exit-btn">DISCONNECT [ESC]</a>
      <canvas id="radarCanvas"></canvas>
      <canvas id="minimap"></canvas>
    </div>

    <div id="sidebar">
      <div id="log-header">MEMORY_BANK.vrc</div>
      <div id="log-content"></div>
    </div>

    <script>
      const memoryLogs = [
        "Sprinklers watering plastic flowers.",
        "Metal-hearted birds.",
        "Infinite factory production.",
        "Request for more light.",
        "Summer 2091 photo.",
        "Wind-played piano.",
        "Bot repairing stone.",
        "Un-named stars.",
        "200-year locked door.",
      ];
      let unusedLogs = [...memoryLogs];

      const canvas = document.getElementById("radarCanvas");
      const ctx = canvas.getContext("2d");
      const mCanvas = document.getElementById("minimap");
      const mCtx = mCanvas.getContext("2d");

      canvas.width = window.innerWidth - 320;
      canvas.height = window.innerHeight;
      mCanvas.width = 150;
      mCanvas.height = 150;

      const WORLD_SIZE = 2000;
      let score = 0,
        sync = 0,
        integrity = 100,
        discovered = false,
        glitchTime = 0,
        isGameOver = false;
      let camX = 500,
        camY = 500;
      let mousePos = { x: 1000, y: 1000 },
        playerPos = { x: 1000, y: 1000 };
      const MOVE_SMOOTHING = 0.08;

      let signal = { x: 400, y: 400 };
      let audioCtx = null,
        nextPingTime = 0;

      const buildings = [];
      for (let i = 0; i < 40; i++) {
        buildings.push({
          x: Math.random() * 1800 + 100,
          y: Math.random() * 1800 + 100,
          w: Math.random() * 150 + 50,
          h: Math.random() * 150 + 50,
        });
      }

      let seekers = Array.from({ length: 10 }, () => ({
        x: Math.random() * WORLD_SIZE,
        y: Math.random() * WORLD_SIZE,
        vx: Math.random() * 1.5 - 0.75,
        vy: Math.random() * 1.5 - 0.75,
        detectionRange: 130,
      }));

      function checkCollision(px, py) {
        if (px < 0 || px > WORLD_SIZE || py < 0 || py > WORLD_SIZE) return true;
        return buildings.some(
          (b) => px > b.x && px < b.x + b.w && py > b.y && py < b.y + b.h
        );
      }

      function initAudio() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      function playPing(freq, vol) {
        if (!audioCtx || isGameOver) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol * 0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }

      canvas.addEventListener("mousemove", (e) => {
        initAudio();
        const rect = canvas.getBoundingClientRect();
        mousePos.x = e.clientX - rect.left + camX;
        mousePos.y = e.clientY - rect.top + camY;
      });

      function triggerGameOver() {
        isGameOver = true;
        document.getElementById("game-over").style.display = "flex";
      }

      function update() {
        if (isGameOver) return;
        let targetX = playerPos.x + (mousePos.x - playerPos.x) * MOVE_SMOOTHING;
        let targetY = playerPos.y + (mousePos.y - playerPos.y) * MOVE_SMOOTHING;
        if (!checkCollision(targetX, playerPos.y)) playerPos.x = targetX;
        if (!checkCollision(playerPos.x, targetY)) playerPos.y = targetY;

        camX = Math.max(
          0,
          Math.min(WORLD_SIZE - canvas.width, playerPos.x - canvas.width / 2)
        );
        camY = Math.max(
          0,
          Math.min(WORLD_SIZE - canvas.height, playerPos.y - canvas.height / 2)
        );

        const distToNode = Math.sqrt(
          (playerPos.x - signal.x) ** 2 + (playerPos.y - signal.y) ** 2
        );

        // Sound System
        if (audioCtx && audioCtx.currentTime > nextPingTime) {
          const proximity = Math.max(0, 1 - distToNode / 1200);
          playPing(300 + proximity * 1000, proximity);
          nextPingTime = audioCtx.currentTime + (0.1 + distToNode / 1800);
        }

        let detected = false;
        seekers.forEach((s) => {
          let d = Math.sqrt(
            (playerPos.x - s.x) ** 2 + (playerPos.y - s.y) ** 2
          );
          if (d < s.detectionRange) {
            detected = true;
            integrity -= 0.05; // Static damage
            if (d < 20) triggerGameOver(); // Physical contact
            s.vx += (playerPos.x - s.x) * 0.0015;
            s.vy += (playerPos.y - s.y) * 0.0015;
          }
          if (checkCollision(s.x + s.vx, s.y)) s.vx *= -1;
          if (checkCollision(s.x, s.y + s.vy)) s.vy *= -1;
          s.x += s.vx;
          s.y += s.vy;
        });

        if (integrity <= 0) triggerGameOver();

        document.getElementById("status").innerText = detected
          ? "WARNING: SCANNER DETECTED"
          : "NOMINAL";
        document.getElementById("status").className = detected
          ? "warning-ui"
          : "";
        document.getElementById("hp").innerText = Math.ceil(integrity);

        if (distToNode < 45 && !discovered) {
          sync = Math.min(100, sync + 1.5);
          if (sync >= 100) {
            score++;
            discovered = true;
            integrity = Math.min(100, integrity + 15);
            if (unusedLogs.length === 0) unusedLogs = [...memoryLogs];
            const span = document.createElement("span");
            span.innerText = `[NODE_${score}] >> ${
              unusedLogs.splice(
                Math.floor(Math.random() * unusedLogs.length),
                1
              )[0]
            }`;
            document.getElementById("log-content").prepend(span);
            document.getElementById("score").innerText = score;
            glitchTime = 15;
            setTimeout(() => {
              signal = {
                x: Math.random() * 1800 + 100,
                y: Math.random() * 1800 + 100,
              };
              sync = 0;
              discovered = false;
            }, 1500);
          }
        } else if (!discovered) {
          sync = Math.max(0, sync - 0.2);
        }
        document.getElementById("sync").innerText = Math.floor(sync);
      }

      function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-camX, -camY);

        ctx.strokeStyle = "#0a1a1a";
        for (let i = 0; i <= WORLD_SIZE; i += 200) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, WORLD_SIZE);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(WORLD_SIZE, i);
          ctx.stroke();
        }

        ctx.strokeStyle = "#1a3a3a";
        buildings.forEach((b) => ctx.strokeRect(b.x, b.y, b.w, b.h));

        if (!discovered) {
          ctx.strokeStyle = `rgba(0, 255, 204, ${
            0.4 + Math.sin(Date.now() / 200) * 0.3
          })`;
          ctx.strokeRect(signal.x - 10, signal.y - 10, 20, 20);
        }

        seekers.forEach((s) => {
          ctx.fillStyle = "#ff004c";
          ctx.beginPath();
          ctx.arc(s.x, s.y, 4, 0, 7);
          ctx.fill();
          ctx.strokeStyle = "rgba(255, 0, 76, 0.1)";
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.detectionRange, 0, 7);
          ctx.stroke();
        });

        ctx.restore();

        // Player UI
        const vx = playerPos.x - camX,
          vy = playerPos.y - camY;
        ctx.strokeStyle = integrity < 30 ? "#ff004c" : "#00ffcc";
        ctx.strokeRect(vx - 15, vy - 15, 30, 30);
        ctx.beginPath();
        ctx.moveTo(vx - 20, vy);
        ctx.lineTo(vx + 20, vy);
        ctx.moveTo(vx, vy - 20);
        ctx.lineTo(vx, vy + 20);
        ctx.stroke();

        if (glitchTime > 0) {
          ctx.fillStyle = "rgba(0, 255, 204, 0.1)";
          ctx.fillRect(0, Math.random() * canvas.height, canvas.width, 2);
          glitchTime--;
        }

        mCtx.fillStyle = "black";
        mCtx.fillRect(0, 0, 150, 150);
        const s = 150 / WORLD_SIZE;
        mCtx.fillStyle = "#ff004c";
        seekers.forEach((sk) => mCtx.fillRect(sk.x * s, sk.y * s, 2, 2));
        mCtx.fillStyle = integrity < 30 ? "#ff004c" : "#00ffcc";
        mCtx.fillRect(playerPos.x * s - 2, playerPos.y * s - 2, 4, 4);
        mCtx.fillStyle = "white";
        mCtx.fillRect(signal.x * s - 2, signal.y * s - 2, 3, 3);

        update();
        requestAnimationFrame(draw);
      }

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") window.location.href = "../index.html";
      });
      draw();
    </script>
  </body>
</html>
