<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cognis – Ascension Trial</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: black;
        overflow: hidden;
        font-family: "Courier New", monospace;
        color: #d4af37;
        height: 100%;
      }

      canvas {
        display: block;
        margin: 0 auto;
        background: linear-gradient(#050505, #000);
        border-left: 2px solid #333;
        border-right: 2px solid #333;
        /* Ensure the canvas is visible even if JS fails to load */
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      .overlay {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        pointer-events: none;
        text-shadow: 0 0 5px black;
      }

      .hint {
        font-size: 0.8rem;
        opacity: 0.6;
      }

      .back-link {
        pointer-events: auto;
        display: inline-block;
        margin-top: 10px;
        color: #888;
        text-decoration: none;
        font-size: 0.8rem;
      }

      .back-link:hover {
        color: #d4af37;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="400" height="600"></canvas>

    <div class="overlay">
      <h1>ASCENSION PROTOCOL</h1>
      <p>Wait. Jump. Persist.</p>
      <p class="hint">SPACE to jump | ARROWS to move</p>
      <a class="back-link" href="../index.html">⮐ Return to Archive</a>
    </div>

    <script src="game.js"></script>
  </body>
</html>
