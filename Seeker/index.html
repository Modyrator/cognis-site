<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>73RRA – SIGNAL_SEEKER: GRID_STABILITY</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #00ffcc;
        font-family: "Courier New", monospace;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #sidebar {
        width: 320px;
        border-left: 1px solid #1a1a1a;
        background: rgba(0, 5, 5, 0.95);
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-shadow: -10px 0 20px rgba(0, 0, 0, 0.5);
        z-index: 10;
      }
      #log-header {
        font-size: 12px;
        color: #fff;
        margin-bottom: 15px;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
      }
      #log-content {
        flex-grow: 1;
        overflow-y: auto;
        font-size: 11px;
        color: #666;
        line-height: 1.6;
      }
      #log-content span {
        display: block;
        margin-bottom: 12px;
        border-left: 2px solid #00ffcc;
        padding-left: 10px;
        color: #aaa;
      }
      #game-container {
        position: relative;
        flex-grow: 1;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
        background: #000;
      }
      #ui-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: none;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 2px;
        z-index: 5;
      }
      #hp-bar-container {
        width: 150px;
        height: 10px;
        border: 1px solid #333;
        margin-top: 5px;
        background: #111;
      }
      #hp-fill {
        height: 100%;
        background: #00ffcc;
        width: 100%;
        transition: width 0.3s;
      }
      #game-over {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(20, 0, 0, 0.9);
        color: #ff004c;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      #exit-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 6px 14px;
        border: 1px solid #333;
        background: rgba(0, 0, 0, 0.8);
        color: #555;
        font-size: 10px;
        text-decoration: none;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="game-over">
      <h1>HARDWARE_FAILURE</h1>
      <p>CRITICAL INTEGRITY LOSS</p>
      <button
        onclick="location.reload()"
        style="
          background: none;
          border: 1px solid #ff004c;
          color: #ff004c;
          padding: 10px;
          cursor: pointer;
          font-family: inherit;
        "
      >
        REBOOT_SYSTEM
      </button>
    </div>

    <div id="game-container">
      <div id="ui-overlay">
        SECTOR: <span id="sector-lvl">1</span><br />
        NODES: <span id="score">0</span>/5<br />
        HP:
        <div id="hp-bar-container"><div id="hp-fill"></div></div>
      </div>
      <a href="../index.html" id="exit-btn">DISCONNECT [ESC]</a>
      <canvas id="radarCanvas"></canvas>
    </div>

    <div id="sidebar">
      <div id="log-header">SECTOR_DATA.vrc</div>
      <div id="log-content"></div>
    </div>

    <script>
      const memoryLogs = [
        "Atmospheric scrubbers still spinning.",
        "Found a child's toy made of lead.",
        "Satellite relay: 'Awaiting Response'.",
        "Automated highway lights flickering.",
        "A server room filled with frozen water.",
        "Old billboard: 'THE FUTURE IS BRIGHT'.",
      ];
      let unusedLogs = [...memoryLogs];

      const canvas = document.getElementById("radarCanvas");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth - 320;
      canvas.height = window.innerHeight;

      const WORLD_SIZE = 2500;
      const GRID_CELLS = 8;
      const CELL_SIZE = WORLD_SIZE / GRID_CELLS;

      let score = 0,
        sector = 1,
        sync = 0,
        hp = 50,
        maxHP = 50,
        isGameOver = false;
      let player = { x: 1250, y: 1250, speed: 5 };
      let keys = {};
      let buildings = [],
        seekers = [],
        signal = { x: 0, y: 0 };
      let audioCtx = null,
        nextPingTime = 0;

      function initMap() {
        buildings = [];
        // Grid-based generation ensures accessibility
        for (let gx = 0; gx < GRID_CELLS; gx++) {
          for (let gy = 0; gy < GRID_CELLS; gy++) {
            // Leave the player's starting grid empty
            let centerX = gx * CELL_SIZE + CELL_SIZE / 2;
            let centerY = gy * CELL_SIZE + CELL_SIZE / 2;
            let distToStart = Math.sqrt(
              (centerX - 1250) ** 2 + (centerY - 1250) ** 2
            );

            if (distToStart > 300 && Math.random() > 0.3) {
              let w = Math.random() * (CELL_SIZE * 0.6) + 50;
              let h = Math.random() * (CELL_SIZE * 0.6) + 50;
              buildings.push({
                x: gx * CELL_SIZE + (CELL_SIZE - w) / 2,
                y: gy * CELL_SIZE + (CELL_SIZE - h) / 2,
                w: w,
                h: h,
              });
            }
          }
        }
        spawnSignal();
        seekers = [];
        for (let i = 0; i < 6 + sector * 2; i++) {
          seekers.push({
            x: Math.random() * WORLD_SIZE,
            y: Math.random() * WORLD_SIZE,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            range: 140,
            patrolType: Math.random() > 0.5 ? "circle" : "roam",
            angle: Math.random() * Math.PI * 2,
          });
        }
      }

      function spawnSignal() {
        signal = {
          x: Math.random() * (WORLD_SIZE - 400) + 200,
          y: Math.random() * (WORLD_SIZE - 400) + 200,
        };
        if (checkCollision(signal.x, signal.y)) spawnSignal();
      }

      function checkCollision(px, py) {
        if (px < 20 || px > WORLD_SIZE - 20 || py < 20 || py > WORLD_SIZE - 20)
          return true;
        return buildings.some(
          (b) =>
            px > b.x - 5 &&
            px < b.x + b.w + 5 &&
            py > b.y - 5 &&
            py < b.y + b.h + 5
        );
      }

      window.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        if (e.code === "Escape") window.location.href = "../index.html";
      });
      window.addEventListener("keyup", (e) => (keys[e.code] = false));

      function update() {
        if (isGameOver) return;
        if (
          !audioCtx &&
          (keys["KeyW"] || keys["KeyA"] || keys["KeyS"] || keys["KeyD"])
        ) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        let dx = 0,
          dy = 0;
        if (keys["KeyW"]) dy -= player.speed;
        if (keys["KeyS"]) dy += player.speed;
        if (keys["KeyA"]) dx -= player.speed;
        if (keys["KeyD"]) dx += player.speed;

        if (!checkCollision(player.x + dx, player.y)) player.x += dx;
        if (!checkCollision(player.x, player.y + dy)) player.y += dy;

        seekers.forEach((s) => {
          let dist = Math.sqrt((player.x - s.x) ** 2 + (player.y - s.y) ** 2);
          if (dist < s.range) {
            hp -= 0.083; // 5 dmg per second
            s.x += (player.x - s.x) * 0.015;
            s.y += (player.y - s.y) * 0.015;
          } else {
            if (s.patrolType === "roam") {
              if (checkCollision(s.x + s.vx * 10, s.y + s.vy * 10)) {
                s.vx *= -1;
                s.vy *= -1;
              }
              s.x += s.vx;
              s.y += s.vy;
            } else {
              s.angle += 0.02;
              s.x += Math.cos(s.angle) * 2;
              s.y += Math.sin(s.angle) * 2;
            }
          }
        });

        let distNode = Math.sqrt(
          (player.x - signal.x) ** 2 + (player.y - signal.y) ** 2
        );

        // Audio Guidance
        if (audioCtx && audioCtx.currentTime > nextPingTime) {
          let prox = Math.max(0, 1 - distNode / 1800);
          let osc = audioCtx.createOscillator();
          let g = audioCtx.createGain();
          osc.frequency.setValueAtTime(150 + prox * 900, audioCtx.currentTime);
          g.gain.setValueAtTime(prox * 0.04, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(
            0.001,
            audioCtx.currentTime + 0.1
          );
          osc.connect(g);
          g.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.1);
          nextPingTime = audioCtx.currentTime + (0.15 + distNode / 2200);
        }

        if (distNode < 60) {
          sync = Math.min(100, sync + 1.5);
          if (sync >= 100) {
            score++;
            hp = Math.min(maxHP, hp + 10);
            addLog();
            sync = 0;
            if (score % 5 === 0) {
              sector++;
              document.getElementById("sector-lvl").innerText = sector;
              player.x = 1250;
              player.y = 1250;
              initMap();
            } else {
              spawnSignal();
            }
          }
        } else {
          sync = Math.max(0, sync - 0.3);
        }

        document.getElementById("hp-fill").style.width =
          (hp / maxHP) * 100 + "%";
        if (hp <= 0) {
          isGameOver = true;
          document.getElementById("game-over").style.display = "flex";
        }
      }

      function addLog() {
        if (unusedLogs.length === 0) unusedLogs = [...memoryLogs];
        const msg = unusedLogs.splice(
          Math.floor(Math.random() * unusedLogs.length),
          1
        )[0];
        const span = document.createElement("span");
        span.innerText = `[SEC_${sector}] >> ${msg}`;
        document.getElementById("log-content").prepend(span);
      }

      function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const camX = player.x - canvas.width / 2;
        const camY = player.y - canvas.height / 2;

        ctx.save();
        ctx.translate(-camX, -camY);

        // Boundary
        ctx.strokeStyle = "#111";
        ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        // Buildings (Grid-Safe)
        ctx.strokeStyle = "#1a3a3a";
        buildings.forEach((b) => ctx.strokeRect(b.x, b.y, b.w, b.h));

        // Node
        ctx.strokeStyle = `rgba(255,255,255, ${
          0.5 + Math.sin(Date.now() / 150) * 0.5
        })`;
        ctx.beginPath();
        ctx.arc(signal.x, signal.y, 20, 0, 7);
        ctx.stroke();

        // Seekers
        seekers.forEach((s) => {
          ctx.fillStyle = "#ff004c";
          ctx.beginPath();
          ctx.arc(s.x, s.y, 5, 0, 7);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,0,76,0.1)";
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.range, 0, 7);
          ctx.stroke();
        });

        // Player Bot
        ctx.strokeStyle = "#00ffcc";
        ctx.strokeRect(player.x - 12, player.y - 12, 24, 24);

        ctx.restore();
        update();
        requestAnimationFrame(draw);
      }

      initMap();
      draw();
    </script>
  </body>
</html>
