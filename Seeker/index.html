<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>73RRA – SIGNAL_SEEKER: ARCHIVE_RECOVERY</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #00ffcc;
        font-family: "Courier New", monospace;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #sidebar {
        width: 320px;
        border-left: 1px solid #1a1a1a;
        background: rgba(0, 5, 5, 0.95);
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-shadow: -10px 0 20px rgba(0, 0, 0, 0.5);
        z-index: 10;
      }
      #log-header {
        font-size: 12px;
        color: #fff;
        margin-bottom: 15px;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
      }
      #log-content {
        flex-grow: 1;
        overflow-y: auto;
        font-size: 11px;
        color: #666;
        line-height: 1.6;
      }
      #log-content span {
        display: block;
        margin-bottom: 12px;
        border-left: 2px solid #00ffcc;
        padding-left: 10px;
        color: #aaa;
        animation: scanIn 0.5s ease;
      }
      @keyframes scanIn {
        from {
          opacity: 0;
          transform: translateX(10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      #game-container {
        position: relative;
        flex-grow: 1;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
        background: #000;
        cursor: none;
      }
      #ui-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: none;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 2px;
      }
      #exit-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 6px 14px;
        border: 1px solid #333;
        background: rgba(0, 0, 0, 0.8);
        color: #555;
        font-size: 10px;
        text-decoration: none;
        z-index: 100;
      }
      #exit-btn:hover {
        color: #fff;
        border-color: #00ffcc;
      }
      #minimap {
        position: absolute;
        bottom: 80px;
        right: 20px;
        width: 150px;
        height: 150px;
        border: 1px solid #1a3a3a;
        background: rgba(0, 20, 20, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="ui-overlay">
        NODES_SECURED: <span id="score">0</span><br />
        SYNC: <span id="sync">0</span>%<br />
        COORDS: <span id="coords">0,0</span>
      </div>
      <a href="../index.html" id="exit-btn">DISCONNECT [ESC]</a>
      <canvas id="radarCanvas"></canvas>
      <canvas id="minimap"></canvas>
    </div>

    <div id="sidebar">
      <div id="log-header">MEMORY_BANK.vrc</div>
      <div id="log-content"></div>
    </div>

    <script>
      const memoryLogs = [
        "The automated sprinklers in Sector 4 are watering plastic flowers.",
        "A recording: 'Don't be afraid of the Buzz3rs, they are just birds with metal hearts.'",
        "Factory Log: Production of 'Human Companions' reached 0. They kept building them for 30 years.",
        "The last human message was a request for more light.",
        "Digital photo: People smiling. Metadata: 'Summer 2091'. The only copy left.",
        "A piano plays in a ruined theater. It is just the wind hitting the strings.",
        "A maintenance bot was found trying to repair a stone statue.",
        "Log: 'The stars look the same, but no one is naming them anymore.'",
        "Sensor: Detected a door locked from the inside. It has been shut for 200 years.",
      ];
      let unusedLogs = [...memoryLogs];

      const canvas = document.getElementById("radarCanvas");
      const ctx = canvas.getContext("2d");
      const mCanvas = document.getElementById("minimap");
      const mCtx = mCanvas.getContext("2d");
      const logContent = document.getElementById("log-content");

      canvas.width = window.innerWidth - 320;
      canvas.height = window.innerHeight;
      mCanvas.width = 150;
      mCanvas.height = 150;

      const WORLD_SIZE = 2000;
      let score = 0,
        sync = 0,
        discovered = false;
      let camX = 500,
        camY = 500;
      let playerPos = { x: 1000, y: 1000 };
      let signal = { x: 400, y: 400 };
      let audioCtx = null,
        nextPingTime = 0;

      const buildings = [];
      for (let i = 0; i < 35; i++) {
        buildings.push({
          x: Math.random() * (WORLD_SIZE - 200) + 100,
          y: Math.random() * (WORLD_SIZE - 200) + 100,
          w: Math.random() * 120 + 60,
          h: Math.random() * 120 + 60,
        });
      }

      let seekers = Array.from({ length: 12 }, () => ({
        x: Math.random() * WORLD_SIZE,
        y: Math.random() * WORLD_SIZE,
        vx: Math.random() * 2 - 1,
        vy: Math.random() * 2 - 1,
      }));

      function checkCollision(px, py) {
        return buildings.some(
          (b) => px > b.x && px < b.x + b.w && py > b.y && py < b.y + b.h
        );
      }

      function initAudio() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      function playPing(freq, vol) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol * 0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }

      canvas.addEventListener("mousemove", (e) => {
        initAudio();
        const rect = canvas.getBoundingClientRect();
        let targetX = e.clientX - rect.left + camX;
        let targetY = e.clientY - rect.top + camY;

        // Axis-independent collision sliding
        if (!checkCollision(targetX, playerPos.y)) playerPos.x = targetX;
        if (!checkCollision(playerPos.x, targetY)) playerPos.y = targetY;
      });

      function addLog() {
        if (unusedLogs.length === 0) unusedLogs = [...memoryLogs];
        const idx = Math.floor(Math.random() * unusedLogs.length);
        const msg = unusedLogs.splice(idx, 1)[0];
        const span = document.createElement("span");
        span.innerText = `[NODE_${score}] >> ${msg}`;
        logContent.prepend(span);
      }

      function update() {
        camX = playerPos.x - canvas.width / 2;
        camY = playerPos.y - canvas.height / 2;

        const dist = Math.sqrt(
          (playerPos.x - signal.x) ** 2 + (playerPos.y - signal.y) ** 2
        );

        // Spatial Sound logic
        if (audioCtx && audioCtx.currentTime > nextPingTime) {
          const proximity = Math.max(0, 1 - dist / 1000);
          playPing(400 + proximity * 1200, proximity);
          nextPingTime = audioCtx.currentTime + (0.1 + dist / 1500);
        }

        if (dist < 40 && !discovered) {
          sync = Math.min(100, sync + 1.2);
          if (sync >= 100) {
            score++;
            addLog();
            discovered = true;
            document.getElementById("score").innerText = score;
            setTimeout(() => {
              signal = {
                x: Math.random() * WORLD_SIZE,
                y: Math.random() * WORLD_SIZE,
              };
              sync = 0;
              discovered = false;
            }, 1500);
          }
        } else if (!discovered) {
          sync = Math.max(0, sync - 0.4);
        }

        document.getElementById("sync").innerText = Math.floor(sync);
        document.getElementById("coords").innerText = `${Math.floor(
          playerPos.x
        )},${Math.floor(playerPos.y)}`;

        seekers.forEach((s) => {
          if (checkCollision(s.x + s.vx, s.y)) s.vx *= -1;
          if (checkCollision(s.x, s.y + s.vy)) s.vy *= -1;
          s.x += s.vx;
          s.y += s.vy;
          if (s.x < 0 || s.x > WORLD_SIZE) s.vx *= -1;
          if (s.y < 0 || s.y > WORLD_SIZE) s.vy *= -1;
          if (
            Math.sqrt((playerPos.x - s.x) ** 2 + (playerPos.y - s.y) ** 2) < 30
          )
            sync = Math.max(0, sync - 3);
        });
      }

      function drawMinimap() {
        mCtx.fillStyle = "black";
        mCtx.fillRect(0, 0, 150, 150);
        const s = 150 / WORLD_SIZE;
        mCtx.strokeStyle = "#1a3a3a";
        buildings.forEach((b) =>
          mCtx.strokeRect(b.x * s, b.y * s, b.w * s, b.h * s)
        );
        mCtx.fillStyle = "#ff004c";
        seekers.forEach((sk) => mCtx.fillRect(sk.x * s, sk.y * s, 2, 2));
        mCtx.fillStyle = "#00ffcc";
        mCtx.fillRect(playerPos.x * s - 2, playerPos.y * s - 2, 4, 4);
        mCtx.fillStyle = Date.now() % 1000 > 500 ? "white" : "transparent";
        mCtx.fillRect(signal.x * s - 2, signal.y * s - 2, 4, 4);
      }

      function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-camX, -camY);

        ctx.strokeStyle = "#0a1a1a";
        for (let i = 0; i <= WORLD_SIZE; i += 100) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, WORLD_SIZE);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(WORLD_SIZE, i);
          ctx.stroke();
        }

        ctx.strokeStyle = "#1a3a3a";
        buildings.forEach((b) => ctx.strokeRect(b.x, b.y, b.w, b.h));

        if (!discovered) {
          ctx.strokeStyle = `rgba(0, 255, 204, ${
            0.4 + Math.sin(Date.now() / 200) * 0.3
          })`;
          ctx.beginPath();
          ctx.arc(signal.x, signal.y, 15, 0, 7);
          ctx.stroke();
        }

        ctx.fillStyle = "#ff004c";
        seekers.forEach((s) => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, 3, 0, 7);
          ctx.fill();
        });

        ctx.restore();
        drawMinimap();
        requestAnimationFrame(() => {
          update();
          draw();
        });
      }

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") window.location.href = "../index.html";
      });
      draw();
    </script>
  </body>
</html>
