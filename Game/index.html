<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cognis – Ascension Trial</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #d4af37;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        gap: 30px;
      }

      /* LEGEND PANEL */
      #legend {
        width: 220px;
        border: 1px solid #333;
        padding: 20px;
        background: rgba(10, 10, 10, 0.95);
        font-size: 0.8rem;
        box-shadow: -5px 0 15px rgba(212, 175, 55, 0.1);
      }

      .legend-header {
        color: #fff;
        margin: 0 0 10px 0;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
        letter-spacing: 2px;
      }
      .legend-item {
        margin-bottom: 15px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .color-dot {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        margin-top: 3px;
        flex-shrink: 0;
      }

      /* CRT CONTAINER */
      #game-container {
        position: relative;
        border: 4px solid #222;
        background: #000;
        box-shadow: 0 0 40px rgba(0, 0, 0, 1);
      }

      #game {
        display: block;
        filter: contrast(1.1) brightness(1.1);
        cursor: none;
      }

      .ui-panel {
        position: absolute;
        top: 15px;
        left: 15px;
        z-index: 30;
        pointer-events: none;
      }

      #status-monitor {
        position: absolute;
        bottom: 20px;
        left: 20px;
        z-index: 30;
        background: rgba(0, 0, 0, 0.8);
        padding: 12px;
        border: 1px solid #333;
        min-width: 140px;
      }

      .active-buff {
        font-size: 0.7rem;
        font-weight: bold;
        margin-top: 4px;
        text-shadow: 0 0 5px currentColor;
      }

      #comms-text {
        font-size: 0.6rem;
        color: #00ffcc;
        margin-top: 10px;
        border-top: 1px solid #222;
        padding-top: 5px;
        min-height: 20px;
      }

      #game-over {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="legend">
      <h3 class="legend-header">INPUTS</h3>
      <div class="legend-item"><strong>[WASD]</strong> Move / Jump</div>
      <div class="legend-item"><strong>[ARROWS]</strong> Move / Jump</div>

      <h3 class="legend-header" style="margin-top: 20px">UPGRADES</h3>
      <div class="legend-item">
        <div class="color-dot" style="background: #d4af37"></div>
        <div><strong>AEGIS:</strong><br />Bounces you back up if you fall.</div>
      </div>
      <div class="legend-item">
        <div class="color-dot" style="background: #00ffcc"></div>
        <div>
          <strong>BUFFER:</strong><br />Slows platform speed significantly.
        </div>
      </div>
      <div class="legend-item">
        <div class="color-dot" style="background: #ff004c"></div>
        <div>
          <strong>LATTICE:</strong><br />Attracts you to safe platforms.
        </div>
      </div>
    </div>

    <div id="game-container">
      <div class="ui-panel">
        <div style="font-size: 1.4rem; color: #fff">
          ALTITUDE: <span id="currentScore">0</span>m
        </div>
        <div style="opacity: 0.6; font-size: 0.8rem">
          MAX_PEAK: <span id="highScore">0</span>m
        </div>
      </div>

      <div id="status-monitor">
        <div style="font-size: 0.6rem; color: #666; margin-bottom: 5px">
          SYSTEM_OVERCLOCK:
        </div>
        <div id="active-list">STABLE</div>
        <div id="comms-text">LINK_ESTABLISHED...</div>
      </div>

      <div id="game-over">
        <h1 style="color: #ff004c">SYSTEM_CRASH</h1>
        <p id="final-score"></p>
        <p style="font-size: 0.8rem; color: #666">PRESS ANY KEY TO REBOOT</p>
      </div>

      <canvas id="game"></canvas>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("currentScore");
      const highEl = document.getElementById("highScore");
      const activeList = document.getElementById("active-list");
      const commsEl = document.getElementById("comms-text");
      const gameOverScreen = document.getElementById("game-over");

      canvas.width = 400;
      canvas.height = 600;

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function sfx(f, t, d, v = 0.1) {
        if (audioCtx.state === "suspended") audioCtx.resume();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = t;
        o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + d);
      }

      const playerSprite = new Image();
      playerSprite.src = "jumpyboy.png";
      const platformSprite = new Image();
      platformSprite.src = "platformyboy.png";

      let score = 0,
        highScore = localStorage.getItem("cognis_highscore") || 0;
      highEl.innerText = highScore;

      let player,
        platforms,
        powerUps,
        keys = {},
        isGameOver = false;
      let slowMoTimer = 0,
        magnetTimer = 0,
        lastMilestone = 0;

      // SETTINGS
      const PLATFORM_COUNT = 12; // Increased for better density
      const RECYCLE_DISTANCE = 750; // Tighter loop to prevent empty space

      function init() {
        score = 0;
        scoreEl.innerText = 0;
        lastMilestone = 0;
        isGameOver = false;
        gameOverScreen.style.display = "none";
        slowMoTimer = 0;
        magnetTimer = 0;
        commsEl.innerText = "LINK_ESTABLISHED...";
        player = {
          x: 185,
          y: 500,
          w: 30,
          h: 30,
          dy: 0,
          vx: 0,
          onGround: false,
          shielded: false,
        };
        platforms = [];
        powerUps = [];

        // Ground platform
        platforms.push({ x: 0, y: 580, w: 400, h: 20, dir: 0, speed: 0 });

        // Build density
        for (let i = 1; i < PLATFORM_COUNT; i++) {
          spawnPlatform(canvas.height - i * 80); // Closer vertical spacing
        }
      }

      function spawnPlatform(y) {
        const plat = {
          x: Math.random() * 320,
          y: y,
          w: 80,
          h: 18,
          dir: Math.random() < 0.5 ? -1 : 1,
          speed: 1.0 + Math.random() * 1.0,
        };
        platforms.push(plat);
        trySpawnPowerUp(plat);
      }

      function trySpawnPowerUp(plat) {
        if (Math.random() < 0.5) {
          const types = ["shield", "slowmo", "magnet"];
          powerUps.push({
            type: types[Math.floor(Math.random() * types.length)],
            parent: plat,
          });
        }
      }

      window.addEventListener("keydown", (e) => {
        if (isGameOver) {
          init();
          return;
        }
        keys[e.code] = true;
        if (["Space", "KeyW", "ArrowUp"].includes(e.code) && player.onGround) {
          player.dy = -11;
          player.onGround = false;
          sfx(450, "square", 0.1);
        }
      });
      window.addEventListener("keyup", (e) => (keys[e.code] = false));

      function update() {
        if (isGameOver) return;

        if (keys["ArrowLeft"] || keys["KeyA"]) player.vx = -4.5;
        else if (keys["ArrowRight"] || keys["KeyD"]) player.vx = 4.5;
        else player.vx = 0;

        if (magnetTimer > 0) {
          magnetTimer--;
          platforms.forEach((p) => {
            if (Math.abs(player.y - p.y) < 80 && player.dy > 0) {
              player.x += (p.x + p.w / 2 - player.w / 2 - player.x) * 0.12;
            }
          });
        }

        player.x += player.vx;
        if (!player.onGround) {
          player.dy += 0.45;
          player.y += player.dy;
        }
        player.onGround = false;

        let timeScale = slowMoTimer-- > 0 ? 0.4 : 1.0;

        platforms.forEach((p, index) => {
          p.x += p.dir * p.speed * timeScale;
          if (p.x <= 0 || p.x + p.w >= canvas.width) p.dir *= -1;

          if (
            player.dy >= 0 &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w &&
            player.y + player.h >= p.y &&
            player.y + player.h <= p.y + 15
          ) {
            player.y = p.y - player.h;
            player.dy = 0;
            player.onGround = true;
            player.x += p.dir * p.speed * timeScale;
          }

          // RECYCLE FIX: Check against canvas height + buffer
          if (p.y > canvas.height + 20 && index !== 0) {
            p.y -= RECYCLE_DISTANCE;
            p.x = Math.random() * (canvas.width - p.w);
            powerUps = powerUps.filter((pu) => pu.parent !== p);
            trySpawnPowerUp(p);
          }
        });

        powerUps.forEach((pu, i) => {
          let px = pu.parent.x + pu.parent.w / 2 - 8;
          let py = pu.parent.y - 25;
          if (
            player.x < px + 16 &&
            player.x + player.w > px &&
            player.y < py + 16 &&
            player.y + player.h > py
          ) {
            sfx(700, "sine", 0.15);
            if (pu.type === "shield") player.shielded = true;
            if (pu.type === "slowmo") slowMoTimer = 450;
            if (pu.type === "magnet") magnetTimer = 450;
            powerUps.splice(i, 1);
          }
        });

        if (player.y < 300) {
          let diff = 300 - player.y;
          player.y = 300;
          score += Math.floor(diff);
          scoreEl.innerText = Math.floor(score / 10);
          platforms.forEach((p) => (p.y += diff));
        }

        // Narrative milestones
        let currentAlt = Math.floor(score / 10);
        if (currentAlt >= 100 && lastMilestone < 100) {
          commsEl.innerText = "[COMMS] DATA: FAYDRIC'S TOUCH REMAINS.";
          lastMilestone = 100;
        } else if (currentAlt >= 300 && lastMilestone < 300) {
          commsEl.innerText = "[COMMS] WARN: ATMOSPHERIC THINNING.";
          lastMilestone = 300;
        } else if (currentAlt >= 600 && lastMilestone < 600) {
          commsEl.innerText = "[COMMS] MEMORY: THE CORE IS STEADY.";
          lastMilestone = 600;
        }

        if (player.x > canvas.width) player.x = -player.w;
        if (player.x < -player.w) player.x = canvas.width;

        if (player.y > canvas.height + 50) {
          if (player.shielded) {
            player.dy = -16;
            player.shielded = false;
            sfx(600, "triangle", 0.2);
          } else die();
        }
        updateUI();
      }

      function die() {
        isGameOver = true;
        sfx(100, "sawtooth", 0.5);
        gameOverScreen.style.display = "flex";
        document.getElementById("final-score").innerText =
          "FINAL_ALTITUDE: " + Math.floor(score / 10) + "m";
        if (Math.floor(score / 10) > highScore) {
          highScore = Math.floor(score / 10);
          localStorage.setItem("cognis_highscore", highScore);
          highEl.innerText = highScore;
        }
      }

      function updateUI() {
        let buffs = [];
        if (player.shielded)
          buffs.push(
            "<div class='active-buff' style='color:#d4af37'>[AEGIS_ENABLED]</div>"
          );
        if (slowMoTimer > 0)
          buffs.push(
            "<div class='active-buff' style='color:#00ffcc'>[BUFFER_ACTIVE]</div>"
          );
        if (magnetTimer > 0)
          buffs.push(
            "<div class='active-buff' style='color:#ff004c'>[LATTICE_LINK]</div>"
          );
        activeList.innerHTML = buffs.length ? buffs.join("") : "NOMINAL";
      }

      function draw() {
        ctx.clearRect(0, 0, 400, 600);
        platforms.forEach((p) =>
          ctx.drawImage(platformSprite, p.x, p.y, p.w, p.h)
        );
        powerUps.forEach((pu) => {
          let px = pu.parent.x + pu.parent.w / 2 - 8;
          let py = pu.parent.y - 25;
          ctx.fillStyle =
            pu.type === "shield"
              ? "#d4af37"
              : pu.type === "slowmo"
              ? "#00ffcc"
              : "#ff004c";
          ctx.shadowBlur = 10;
          ctx.shadowColor = ctx.fillStyle;
          ctx.fillRect(px, py, 16, 16);
          ctx.shadowBlur = 0;
        });
        if (player.shielded) {
          ctx.strokeStyle = "#d4af37";
          ctx.setLineDash([4, 2]);
          ctx.beginPath();
          ctx.arc(player.x + 15, player.y + 15, 25, 0, 7);
          ctx.stroke();
          ctx.setLineDash([]);
        }
        ctx.drawImage(playerSprite, player.x, player.y, player.w, player.h);
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      let loadCount = 0;
      const start = () => {
        if (++loadCount === 2) {
          init();
          loop();
        }
      };
      playerSprite.onload = start;
      platformSprite.onload = start;
    </script>
  </body>
</html>
