<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cognis – Nim Protocol</title>
    <style>
      :root {
        --metal: #8a8d8f;
        --dusty-gold: #c5b358;
        --soft-teal: #7fbdb0;
        --bg: #1a1a1a;
        --danger: #ff004c;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--dusty-gold);
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      .terminal-container {
        width: 90%;
        max-width: 600px;
        padding: 40px;
        border: 2px solid var(--metal);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
        text-align: center;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }
      .piles {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 30px 0;
        min-height: 140px;
      }
      .pile-col {
        display: flex;
        flex-direction: column-reverse;
        gap: 5px;
        padding: 20px 15px; /* Mobile friendly */
        min-width: 50px;
        cursor: pointer;
        border: 1px solid transparent;
        border-radius: 10px;
        transition: 0.2s;
      }
      .pile-col:hover {
        border: 1px solid var(--soft-teal);
        background: rgba(127, 189, 176, 0.1);
      }
      .pile-col:active {
        background: rgba(127, 189, 176, 0.3);
      }
      .pile-col.locked {
        opacity: 0.5;
        filter: grayscale(1);
        cursor: not-allowed;
      }
      .stone-sprite {
        width: 40px; /* Mobile friendly */
        height: 40px;
        background-size: contain;
        background-repeat: no-repeat;
        background-image: url("nimstone.png");
        background-color: var(--soft-teal);
        border-radius: 4px;
      }
      #status {
        font-size: 1.2rem;
        margin-bottom: 10px;
        letter-spacing: 2px;
      }
      .win {
        color: var(--soft-teal);
        text-shadow: 0 0 10px var(--soft-teal);
      }
      .lose {
        color: var(--danger);
        text-shadow: 0 0 10px var(--danger);
      }
      button {
        background: var(--metal);
        color: var(--bg);
        border: none;
        padding: 12px 24px;
        cursor: pointer;
        font-weight: bold;
        border-radius: 5px;
        text-transform: uppercase;
      }
      button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .back-link {
        display: block;
        margin-top: 25px;
        color: var(--metal);
        text-decoration: none;
        font-size: 0.8rem;
      }
      .back-link:hover {
        color: var(--dusty-gold);
      }
    </style>
  </head>
  <body>
    <div class="terminal-container">
      <h1 id="title">NIM_PROTOCOL_v4</h1>
      <div id="status">INITIALIZING...</div>
      <div class="piles" id="piles-container"></div>
      <button id="confirm-btn" onclick="playerMove()" disabled>
        CONFIRM_TURN
      </button>
      <div id="game-over-ui" style="display: none; margin-top: 20px">
        <button onclick="location.reload()">RE-INITIALIZE</button>
      </div>
      <a href="../index.html" class="back-link">BACK TO ARCHIVE</a>
    </div>

    <script>
      let piles = [3, 4, 5, 2];
      let selectedPile = -1;
      let gameActive = true;

      function render() {
        const container = document.getElementById("piles-container");
        container.innerHTML = "";
        piles.forEach((count, i) => {
          const col = document.createElement("div");
          col.className = "pile-col";
          if (selectedPile !== -1 && selectedPile !== i)
            col.classList.add("locked");
          col.onclick = () => {
            if (gameActive) selectStone(i);
          };
          for (let s = 0; s < count; s++) {
            const stone = document.createElement("div");
            stone.className = "stone-sprite";
            col.appendChild(stone);
          }
          container.appendChild(col);
        });
      }

      function selectStone(i) {
        if (piles[i] > 0 && (selectedPile === -1 || selectedPile === i)) {
          selectedPile = i;
          piles[i]--;
          document.getElementById("confirm-btn").disabled = false;
          render();
        }
      }

      function playerMove() {
        if (!gameActive) return;
        selectedPile = -1;
        document.getElementById("confirm-btn").disabled = true;
        if (checkGameOver("AI")) return;
        document.getElementById("status").innerText = "SYSTEM_THINKING...";
        setTimeout(aiMove, 1000);
      }

      function aiMove() {
        const errorChance = 0.4;
        let nimSum = piles.reduce((a, b) => a ^ b, 0);
        let shouldMakeMistake = Math.random() < errorChance;

        if (shouldMakeMistake || nimSum === 0) {
          let playablePiles = piles
            .map((count, i) => (count > 0 ? i : -1))
            .filter((i) => i !== -1);
          let randomIdx =
            playablePiles[Math.floor(Math.random() * playablePiles.length)];
          let randomTake = Math.floor(Math.random() * piles[randomIdx]) + 1;
          piles[randomIdx] -= randomTake;
        } else {
          // Perfect Strategy
          let pilesGreaterThanOne = piles.filter((p) => p > 1).length;
          if (pilesGreaterThanOne === 1) {
            let otherPilesCount = piles.filter((p) => p === 1).length;
            let indexToChange = piles.findIndex((p) => p > 1);
            piles[indexToChange] = otherPilesCount % 2 === 0 ? 1 : 0;
          } else {
            for (let i = 0; i < piles.length; i++) {
              let targetSize = piles[i] ^ nimSum;
              if (targetSize < piles[i]) {
                piles[i] = targetSize;
                break;
              }
            }
          }
        }

        render();
        if (!checkGameOver("PLAYER")) {
          document.getElementById("status").innerText = "YOUR_TURN";
        }
      }

      function checkGameOver(nextTurn) {
        if (piles.every((p) => p === 0)) {
          gameActive = false;
          const status = document.getElementById("status");
          document.getElementById("confirm-btn").style.display = "none";
          document.getElementById("game-over-ui").style.display = "block";
          if (nextTurn === "AI") {
            status.innerText = "PROTOCOL_FAILURE: YOU_LOST";
            status.className = "lose";
          } else {
            status.innerText = "PROTOCOL_SUCCESS: AI_DEFEATED";
            status.className = "win";
          }
          return true;
        }
        return false;
      }

      window.onload = () => {
        document.getElementById("status").innerText = "YOUR_TURN";
        render();
      };
    </script>
  </body>
</html>
