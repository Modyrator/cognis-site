<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>73RRA – SIGNAL_SEEKER: SENTINEL_EYE</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #00ffcc;
        font-family: "Courier New", monospace;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      #game-wrapper {
        position: relative;
        border: 2px solid #1a1a1a;
        cursor: none;
      }
      canvas {
        display: block;
        background: #000;
        transition: filter 0.1s;
      }
      #ui {
        position: absolute;
        top: 15px;
        left: 15px;
        pointer-events: none;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 2px;
        line-height: 1.5;
        text-shadow: 0 0 5px #00ffcc;
      }
      /* Back Button Styling */
      #exit-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        padding: 5px 12px;
        border: 1px solid #333;
        background: rgba(0, 0, 0, 0.6);
        color: #555;
        font-size: 10px;
        text-decoration: none;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        z-index: 100;
        text-transform: uppercase;
      }
      #exit-btn:hover {
        color: #fff;
        border-color: #ff004c;
        background: rgba(255, 0, 76, 0.1);
        box-shadow: 0 0 10px rgba(255, 0, 76, 0.3);
        text-shadow: 1px 0 #00ffff, -1px 0 #ff004c;
      }
      #terminal {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 50px;
        background: rgba(5, 5, 5, 0.9);
        border-top: 1px solid #333;
        padding: 15px;
        font-size: 12px;
        color: #444;
      }
      .alert {
        color: #ff004c;
        text-shadow: 0 0 8px #ff004c;
        font-weight: bold;
      }
      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.1) 0px,
          rgba(0, 0, 0, 0.1) 1px,
          transparent 2px
        );
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <div id="ui">
        Sync_Stability: [<span id="sync-percent">0</span>%]<br />
        Signal_Depth: <span id="dist-read">---</span><br />
        Threat_Level: <span id="threat">LOW</span>
      </div>
      <a href="../index.html" id="exit-btn">DISCONNECT_UPLINK [ESC]</a>

      <div id="overlay"></div>
      <canvas id="radarCanvas"></canvas>
      <div id="terminal">
        > RECEIVER INITIALIZED. FIND THE ECHO. STAY STEADY.
      </div>
    </div>

    <script>
      const canvas = document.getElementById("radarCanvas");
      const ctx = canvas.getContext("2d");
      const term = document.getElementById("terminal");
      const syncEl = document.getElementById("sync-percent");
      const distEl = document.getElementById("dist-read");
      const threatEl = document.getElementById("threat");

      canvas.width = 750;
      canvas.height = 500;

      let audioCtx, oscillator, gainNode, noiseGain;

      function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();

        const bufferSize = 2 * audioCtx.sampleRate,
          noiseBuffer = audioCtx.createBuffer(
            1,
            bufferSize,
            audioCtx.sampleRate
          ),
          output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = Math.random() * 2 - 1;
        }

        const noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = noiseBuffer;
        noiseNode.loop = true;
        noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0;

        noiseNode.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noiseNode.start();

        oscillator.type = "sine";
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.gain.value = 0;
        oscillator.start();
      }

      let mouse = { x: 375, y: 250 };
      let signal = { x: Math.random() * 650 + 50, y: Math.random() * 400 + 50 };
      let sync = 0,
        discovered = false,
        pulseRadius = 0;
      let interferenceZones = [
        { x: 100, y: 100, r: 90, dx: 1.2, dy: 0.8, chasing: false },
        { x: 600, y: 400, r: 70, dx: -0.8, dy: 1.5, chasing: false },
      ];

      canvas.addEventListener("mousemove", (e) => {
        if (!audioCtx) initAudio();
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      });

      // Keyboard support for back button
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") window.location.href = "index.html";
      });

      function draw() {
        ctx.fillStyle = "rgba(2, 5, 5, 0.25)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const distance = Math.sqrt(
          (mouse.x - signal.x) ** 2 + (mouse.y - signal.y) ** 2
        );
        let inInterference = false;

        interferenceZones.forEach((z) => {
          if (sync > 50) {
            z.chasing = true;
            z.x += (mouse.x - z.x) * 0.012;
            z.y += (mouse.y - z.y) * 0.012;
            threatEl.innerHTML =
              '<span class="alert">HIGH (SENTINEL_DETECTED)</span>';
          } else {
            z.chasing = false;
            z.x += z.dx;
            z.y += z.dy;
            if (z.x < 0 || z.x > canvas.width) z.dx *= -1;
            if (z.y < 0 || z.y > canvas.height) z.dy *= -1;
            threatEl.innerText = "LOW";
          }

          let distToZ = Math.sqrt((mouse.x - z.x) ** 2 + (mouse.y - z.y) ** 2);
          if (distToZ < z.r) inInterference = true;

          ctx.strokeStyle = z.chasing
            ? `rgba(255, 0, 76, ${0.2 * (pulseRadius / 450)})`
            : `rgba(100, 100, 100, 0.1)`;
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          ctx.arc(z.x, z.y, z.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
        });

        if (audioCtx) {
          let volume = inInterference ? 0.01 : Math.max(0, 1 - distance / 400);
          let pitch = 200 + (1 - distance / 800) * 1000;
          gainNode.gain.setTargetAtTime(
            volume * 0.15,
            audioCtx.currentTime,
            0.1
          );
          oscillator.frequency.setTargetAtTime(
            pitch,
            audioCtx.currentTime,
            0.1
          );
          oscillator.type = sync > 50 ? "sawtooth" : "sine";
          noiseGain.gain.setTargetAtTime(
            inInterference ? 0.3 : sync / 400,
            audioCtx.currentTime,
            0.1
          );
        }

        if (inInterference) {
          sync = Math.max(0, sync - 1.2);
          canvas.style.filter = `hue-rotate(${
            Math.random() * 90
          }deg) brightness(1.5)`;
          term.innerHTML = `<span class="alert">> CRITICAL: AMS_SENTINEL OVERRIDE IN PROGRESS...</span>`;
        } else {
          canvas.style.filter = `none`;
          if (distance < 30 && !discovered) {
            sync = Math.min(100, sync + 0.35);
            if (sync >= 100) {
              discovered = true;
              term.innerHTML = `<span style="color:#00ffcc">> ECHO_STABILIZED: ${
                [
                  "'I remember the rain...'",
                  "'The factory is so cold now.'",
                  "'Why did they leave?'",
                ][Math.floor(Math.random() * 3)]
              }</span>`;
              setTimeout(resetSignal, 4000);
            }
          } else if (!discovered) {
            sync = Math.max(0, sync - 0.05);
          }
        }

        syncEl.innerText = Math.floor(sync);
        distEl.innerText = inInterference
          ? "SIGNAL_BLOCKED"
          : Math.floor(distance) + "u";

        pulseRadius = (pulseRadius + 3) % 450;
        ctx.strokeStyle = inInterference
          ? `rgba(255, 0, 76, ${1 - pulseRadius / 450})`
          : `rgba(0, 255, 204, ${1 - pulseRadius / 450})`;
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, pulseRadius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = inInterference ? "#ff004c" : "#00ffcc";
        ctx.lineWidth = 2;
        ctx.strokeRect(mouse.x - 15, mouse.y - 15, 30, 30);
        ctx.beginPath();
        ctx.moveTo(mouse.x - 25, mouse.y);
        ctx.lineTo(mouse.x + 25, mouse.y);
        ctx.moveTo(mouse.x, mouse.y - 25);
        ctx.lineTo(mouse.x, mouse.y + 25);
        ctx.stroke();

        requestAnimationFrame(draw);
      }

      function resetSignal() {
        signal = { x: Math.random() * 650 + 50, y: Math.random() * 400 + 50 };
        sync = 0;
        discovered = false;
        term.innerText = "> SCANNING FOR NEW RESIDUAL MEMORY...";
      }

      draw();
    </script>
  </body>
</html>
